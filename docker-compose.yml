services:
  db:
    image: postgres:16
    container_name: land-explorer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: land_explorer
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - land-explorer-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d land_explorer"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  land-explorer-data:
